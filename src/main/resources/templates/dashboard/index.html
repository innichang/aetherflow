<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AetherFlow — Workflows</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; }
    nav { background: #1e293b; color: #f8fafc; padding: 0 24px; display: flex; align-items: center; gap: 24px; height: 52px; }
    nav a { color: #94a3b8; text-decoration: none; font-size: 14px; }
    nav a:hover, nav a.active { color: #f8fafc; }
    nav .brand { font-weight: 700; font-size: 16px; color: #f8fafc; margin-right: 16px; }
    main { max-width: 960px; margin: 32px auto; padding: 0 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    th { background: #f1f5f9; text-align: left; padding: 12px 16px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #64748b; }
    td { padding: 14px 16px; border-top: 1px solid #f1f5f9; font-size: 14px; }
    tr:hover td { background: #f8fafc; }
    a.btn { display: inline-block; padding: 5px 14px; background: #3b82f6; color: #fff; border-radius: 5px; text-decoration: none; font-size: 13px; }
    a.btn:hover { background: #2563eb; }
    .empty { text-align: center; padding: 48px; color: #94a3b8; font-size: 14px; }
    .loading { color: #94a3b8; font-size: 14px; padding: 24px 0; }
  </style>
</head>
<body>
<nav>
  <span class="brand">AetherFlow</span>
  <a href="/dashboard" class="active">Workflows</a>
  <a href="/dashboard/runs">Runs</a>
  <a href="/actuator/prometheus" target="_blank">Metrics</a>
</nav>
<main>
  <h1>Workflows</h1>
  <div id="content" class="loading">Loading…</div>
</main>
<script>
  async function load() {
    const res = await fetch('/workflows');
    const workflows = await res.json();
    const el = document.getElementById('content');
    if (!workflows.length) {
      el.innerHTML = '<div class="empty">No workflows registered.</div>';
      return;
    }
    el.innerHTML = `
      <table>
        <thead><tr>
          <th>Workflow</th>
          <th>Steps</th>
          <th></th>
        </tr></thead>
        <tbody>${workflows.map(w => `
          <tr>
            <td><strong>${w.workflowName}</strong></td>
            <td>${w.stepCount}</td>
            <td>
              <a class="btn" href="/dashboard/runs?workflowName=${encodeURIComponent(w.workflowName)}">View runs</a>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }
  load();
</script>
</body>
</html>
